name: Job Agent

on:
  workflow_dispatch:

  schedule:
    # 每天 UTC 08:00 运行
    # 美国东部夏令时约为凌晨 4 点
    - cron: "0 8 * * *"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Run Job Agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          node <<'EOF'
          const supabaseUrl = process.env.SUPABASE_URL;
          const supabaseKey = process.env.SUPABASE_SERVICE_ROLE_KEY;
          const resendApiKey = process.env.RESEND_API_KEY;

          if (!supabaseUrl || !supabaseKey || !resendApiKey) {
            throw new Error("缺少 GitHub Secrets");
          }

          const headers = {
            apikey: supabaseKey,
            Authorization: `Bearer ${supabaseKey}`,
            "Content-Type": "application/json"
          };

          async function supabaseRequest(path, options = {}) {
            const response = await fetch(
              `${supabaseUrl}/rest/v1/${path}`,
              {
                ...options,
                headers: {
                  ...headers,
                  ...(options.headers || {})
                }
              }
            );

            const text = await response.text();

            if (!response.ok) {
              throw new Error(
                `Supabase 请求失败 ${response.status}: ${text}`
              );
            }

            return text ? JSON.parse(text) : null;
          }

          async function getSubscribers() {
            return await supabaseRequest(
              "subscribers?select=email,keywords"
            );
          }

          async function getSentJobs(email) {
            return await supabaseRequest(
              `sent_jobs?select=job_id&subscriber_email=eq.${encodeURIComponent(email)}`
            );
          }

          async function saveSentJob(subscriber, job) {
            const response = await fetch(
              `${supabaseUrl}/rest/v1/sent_jobs`,
              {
                method: "POST",
                headers: {
                  ...headers,
                  Prefer: "resolution=ignore-duplicates"
                },
                body: JSON.stringify({
                  subscriber_email: subscriber.email,
                  job_id: job.id,
                  job_title: job.position,
                  job_company: job.company,
                  job_url: job.url,
                  sent_at: new Date().toISOString()
                })
              }
            );

            const text = await response.text();

            if (!response.ok) {
              throw new Error(
                `保存 sent_jobs 失败 ${response.status}: ${text}`
              );
            }
          }

          async function getJobs() {
            const response = await fetch("https://remoteok.com/api", {
              headers: {
                "User-Agent": "JobAgent/1.0"
              }
            });

            if (!response.ok) {
              throw new Error(`RemoteOK 请求失败: ${response.status}`);
            }

            const data = await response.json();

            return data.filter(job => job && job.id && job.position);
          }

          function normalizeKeywords(value) {
            return String(value || "")
              .toLowerCase()
              .split(",")
              .map(item => item.trim())
              .filter(Boolean);
          }

          function jobMatches(job, keywords) {
            const text = [
              job.position,
              job.company,
              job.description,
              ...(job.tags || [])
            ]
              .filter(Boolean)
              .join(" ")
              .toLowerCase();

            return keywords.some(keyword => text.includes(keyword));
          }

          function escapeHtml(value) {
            return String(value || "")
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;")
              .replaceAll("'", "&#039;");
          }

          async function sendEmail(to, jobs) {
            const rows = jobs.map(job => `
              <li style="margin-bottom:16px;">
                <a href="${escapeHtml(job.url)}">
                  <strong>${escapeHtml(job.position)}</strong>
                </a>
                <br>
                <span>${escapeHtml(job.company || "Unknown company")}</span>
              </li>
            `).join("");

            const html = `
              <div style="font-family:Arial,sans-serif;line-height:1.6;">
                <h2>JobAgent 找到新的远程职位</h2>
                <p>根据你的关键词，今天找到 ${jobs.length} 个新职位：</p>
                <ul>${rows}</ul>
                <hr>
                <p style="color:#777;font-size:12px;">
                  这是 JobAgent 自动发送的职位提醒。
                </p>
              </div>
            `;

            const response = await fetch(
              "https://api.resend.com/emails",
              {
                method: "POST",
                headers: {
                  Authorization: `Bearer ${resendApiKey}`,
                  "Content-Type": "application/json"
                },
                body: JSON.stringify({
                  from: "JobAgent <onboarding@resend.dev>",
                  to: [to],
                  subject: `JobAgent：今天有 ${jobs.length} 个匹配职位`,
                  html
                })
              }
            );

            const text = await response.text();

            if (!response.ok) {
              throw new Error(
                `Resend 发信失败 ${response.status}: ${text}`
              );
            }

            return JSON.parse(text);
          }

          async function main() {
            console.log("开始运行 JobAgent");

            const subscribers = await getSubscribers();
            console.log(`订阅用户数量：${subscribers.length}`);

            const jobs = await getJobs();
            console.log(`RemoteOK 职位数量：${jobs.length}`);

            let totalEmails = 0;
            let totalJobs = 0;

            for (const subscriber of subscribers) {
              const keywords = normalizeKeywords(subscriber.keywords);

              if (!subscriber.email || keywords.length === 0) {
                console.log(`跳过无效订阅：${subscriber.email}`);
                continue;
              }

              const sentRows = await getSentJobs(subscriber.email);
              const sentIds = new Set(
                sentRows.map(row => String(row.job_id))
              );

              const matchedJobs = jobs
                .filter(job => !sentIds.has(String(job.id)))
                .filter(job => jobMatches(job, keywords))
                .slice(0, 10);

              console.log(
                `${subscriber.email} 匹配到 ${matchedJobs.length} 个新职位`
              );

              if (matchedJobs.length === 0) {
                continue;
              }

              await sendEmail(subscriber.email, matchedJobs);

              for (const job of matchedJobs) {
                await saveSentJob(subscriber, job);
              }

              totalEmails += 1;
              totalJobs += matchedJobs.length;
            }

            console.log(`发送邮件数量：${totalEmails}`);
            console.log(`发送职位数量：${totalJobs}`);
            console.log("JobAgent 运行完成");
          }

          main().catch(error => {
            console.error(error);
            process.exit(1);
          });
          EOF
