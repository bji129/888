<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>JobAgent</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>🚀 JobAgent</h1>

            <p class="subtitle">
                每天自动帮你寻找最新远程岗位
            </p>

            <input
                id="email"
                type="email"
                placeholder="你的邮箱">

            <input
                id="keywords"
                type="text"
                placeholder="关键词，例如：Python, React">

            <button onclick="subscribe()">
                免费订阅
            </button>

            <p id="msg"></p>

        </div>

    </div>

    <script src="app.js"></script>

</body>

</html>
